<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>403</title>
<style>
html, body {
    height: 100%;
    margin: 0;
    background-color: #0a0a0a;
    color: #c0c0c0;
    font-family: Consolas, monospace;
}

.container {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
}

.box {
    text-align: left;
    line-height: 1.6;
}

.code {
    color: #888;
}

.msg {
    margin-top: 8px;
    color: #bbb;
}
</style>
</head>
<body>
<div class="container">
    <div class="box">
        <div class="code">403 Forbidden</div>
        <div class="msg">Access to this endpoint is denied.</div>
    </div>
</div>
</body>
</html>
